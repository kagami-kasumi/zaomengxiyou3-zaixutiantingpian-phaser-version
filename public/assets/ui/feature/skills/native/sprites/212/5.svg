    <style><![CDATA[
    .button-frame {
      pointer-events: none;
    }

    .button-frame-up,
    .button-frame-over,
    .button-frame-down {
      opacity: 0;
    }

    .button .button-frame-up {
      opacity: 1;
    }

    .button:hover .button-frame-up {
      opacity: 0;
    }
    .button:hover .button-frame-over {
      opacity: 1;
    }

    .button:active .button-frame-over {
      opacity: 0;
    }
    .button:active .button-frame-down {
      opacity: 1;
    }

    .button-frame-hittest {
      opacity: 0;
      pointer-events: all;
      cursor: pointer;
    }
]]></style>
